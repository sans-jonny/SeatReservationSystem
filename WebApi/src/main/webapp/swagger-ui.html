<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Reservation System — API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css">
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js" crossorigin></script>
    <script>
        window.onload = function () {
            SwaggerUIBundle({
                url: './api/openapi.json',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [SwaggerUIBundle.plugins.DownloadUrl],
                layout: 'StandaloneLayout',
                requestInterceptor: (req) => {
                    // Strip the host from spec-generated absolute URLs so that
                    // "Try it out" always uses the same origin as this page.
                    // This keeps requests correct regardless of Tomcat's Context Path
                    // (e.g. /SeatReservationSystem/api/auth/login).
                    if (req.url.startsWith(window.location.origin)) {
                        req.url = req.url.substring(window.location.origin.length);
                    }
                    return req;
                }
            });
        };
    </script>
</body>
</html>
